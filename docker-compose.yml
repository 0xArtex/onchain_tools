services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  launch-monitor:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    # Same-machine Hermes routing: share the host network so the scanner can
    # call Hermes on http://127.0.0.1:8644 without exposing the gateway publicly.
    # Linux-only; for non-Linux Docker Desktop, use host.docker.internal instead.
    network_mode: host
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://127.0.0.1:6379/0
    command: ["python", "-m", "app.main", "agent", "launch"]

volumes:
  redis-data:
